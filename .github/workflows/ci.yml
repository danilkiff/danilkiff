---
name: CI

on:
  pull_request:
  push:
    branches:
      - 'main'
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  avatar:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: "Deps: librsvg"
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: "Avatar: build"
        run: make -C avatar png

      - name: "Artifacts: upload"
        uses: actions/upload-artifact@v4
        with:
          name: avatar
          path: |
            avatar/*.svg
            avatar/*.png
            avatar/preview.html

      - name: "Release: attach artifacts"
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" avatar/*.svg avatar/*.png avatar/preview.html --generate-notes
