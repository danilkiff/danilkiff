---
name: CI

on:
  pull_request:
  push:
    branches:
      - 'main'

jobs:
  avatar:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: "Avatar: regenerate SVG"
        run: python3 avatar/generate.py

      - name: "Avatar: verify masters in sync"
        run: |
          git diff --exit-code -- avatar
          test -z "$(git status --porcelain -- avatar)"
